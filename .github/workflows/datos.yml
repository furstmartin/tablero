name: Actualizar datos del tablero

on:
  schedule:
    - cron: "17 * * * *"   # cada hora, minuto 17
  workflow_dispatch: {}     # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar datos.json
        run: python3 scripts/actualizar_datos.py

      - name: Generar telas.enc.json (cifrado)
        env:
          TELAS_PAGOS_URL: ${{ secrets.TELAS_PAGOS_URL }}
          TELAS_COMPRAS_URL: ${{ secrets.TELAS_COMPRAS_URL }}
          TELAS_CLAVE: ${{ secrets.TELAS_CLAVE }}
        run: |
          pip install cryptography --quiet
          python3 scripts/actualizar_telas.py

      - name: Commit y push si cambió
        run: |
          git config user.name "tablero-bot"
          git config user.email "actions@users.noreply.github.com"
          git add datos.json
          git add telas.enc.json 2>/dev/null || true
          git diff --cached --quiet && echo "sin cambios" && exit 0
          git commit -m "datos $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
